<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valence Details | Package</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="index.html" aria-label="Valence Detailing home">VALENCE DETAILS</a>
        <button
          class="menu-button"
          id="menuButton"
          aria-expanded="false"
          aria-controls="siteNav"
          aria-label="Toggle navigation"
        >
          ☰
        </button>
        <nav class="site-nav" id="siteNav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="services.html">Services</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section package-detail" id="packageDetail">
        <h1 id="packageName">Package</h1>
        <p id="packageSnippet" class="section-intro"></p>

        <div class="price-summary">
          <p><strong>Coupe / Sedan:</strong> <span id="packagePriceCoupe"></span></p>
          <p><strong>SUV / Truck:</strong> <span id="packagePriceSuv"></span></p>
          <p class="price-note" id="packagePriceNote"></p>
        </div>

        <h2>Includes</h2>
        <ul id="packageIncludes" class="includes-list"></ul>

        <button class="button" type="button" id="bookNowButton">Book Now</button>
      </section>
    </main>

    <div class="modal" id="bookingModal" aria-hidden="true">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="bookingTitle">
        <button class="modal-close" id="modalClose" type="button" aria-label="Close booking form">×</button>
        <h2 id="bookingTitle">Booking Request</h2>

        <form id="bookingForm" class="intake-form">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" required />

          <label for="preferredContact">Start message with</label>
          <select id="preferredContact" name="preferredContact" required>
            <option value="email">Email</option>
            <option value="sms">Text Message</option>
          </select>

          <input id="selectedPackage" name="selectedPackage" type="hidden" />

          <button type="submit" class="button">Start Message</button>
        </form>

        <p id="bookingMessage" class="form-message" role="status" aria-live="polite"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
