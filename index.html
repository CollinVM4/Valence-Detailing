<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valence Details | Home</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="index.html" aria-label="Valence Detailing home">VALENCE DETAILS</a>
        <button
          class="menu-button"
          id="menuButton"
          aria-expanded="false"
          aria-controls="siteNav"
          aria-label="Toggle navigation"
        >
          ☰
        </button>
        <nav class="site-nav" id="siteNav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="services.html">Services</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero section">
        <div class="hero-text">
        </div>
      </section>

      <section class="section">
        <div class="carousel" id="homeCarousel">
          <button class="carousel-button" type="button" id="carouselPrev" aria-label="Previous photo">‹</button>
          <img id="carouselImage" class="carousel-image" src="" alt="Detailed vehicle" />
          <button class="carousel-button" type="button" id="carouselNext" aria-label="Next photo">›</button>
        </div>
        <p id="carouselCaption" class="carousel-caption"></p>
        <a class="button home-book-now" href="services.html">BOOK NOW</a>
      </section>

      <section class="section">
        <h2>Packages</h2>
        <p class="section-intro">Pick your package and view full details.</p>

        <div class="vehicle-toggle" data-vehicle-selector>
          <button class="vehicle-button is-active" type="button" data-vehicle="coupe">Coupe / Sedan</button>
          <button class="vehicle-button" type="button" data-vehicle="suv">SUV / Truck</button>
        </div>

        <div class="services-grid" id="packageCardsHome"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
