<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valence Details | Services</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="index.html" aria-label="Valence Detailing home">VALENCE DETAILS</a>
        <button
          class="menu-button"
          id="menuButton"
          aria-expanded="false"
          aria-controls="siteNav"
          aria-label="Toggle navigation"
        >
          ☰
        </button>
        <nav class="site-nav" id="siteNav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="services.html">Services</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <h1>Services</h1>
        <p class="section-intro">Choose a package to view full details and book.</p>

        <div class="vehicle-toggle" data-vehicle-selector>
          <button class="vehicle-button is-active" type="button" data-vehicle="coupe">Coupe / Sedan</button>
          <button class="vehicle-button" type="button" data-vehicle="suv">SUV / Truck</button>
        </div>

        <div class="services-grid" id="packageCardsServices"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
